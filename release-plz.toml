[workspace]
changelog_config = "cliff.toml"
changelog_update = true
dependencies_update = true

# release-plz manages git tags for the Rust crate
git_tag_enable = true
git_release_enable = true

pr_labels = ["release"]
allow_dirty = false
publish_allow_dirty = false
semver_check = false

# Publish to crates.io
publish = true

[[package]]
name = "rara-style"
changelog_path = "crates/rara-style/CHANGELOG.md"
git_release_body = """
{{ changelog }}

---

📦 Published to [crates.io](https://crates.io/crates/rara-style/{{ version }})

```bash
cargo add rara-style
```
"""
