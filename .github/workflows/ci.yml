name: CI

on:
  push:
    branches: ['main']
  pull_request:
    branches: ['main']

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

permissions:
  contents: read
  pull-requests: read

jobs:
  lint:
    name: Lint
    runs-on: arc-runner-set
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Prettier check
        run: npm run format:check

      - name: Build (verify build.ts works)
        run: npm run build

  rust:
    name: Rust
    runs-on: arc-runner-set
    steps:
      - uses: actions/checkout@v6

      - name: Clippy
        run: cargo clippy --workspace --all-features -- -D warnings

      - name: Clippy (no features)
        run: cargo clippy --workspace -- -D warnings

      - name: Doc
        run: cargo doc --workspace --all-features --no-deps
        env:
          RUSTDOCFLAGS: -D warnings

  go:
    name: Go
    runs-on: arc-runner-set
    steps:
      - uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: packages/go/go.mod

      - name: Build
        working-directory: packages/go
        run: go build ./...

      - name: Vet
        working-directory: packages/go
        run: go vet ./...

  release-pr:
    name: Release PR
    needs: [lint, rust, go]
    if: ${{ always() && github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.lint.result == 'success' && needs.rust.result == 'success' && needs.go.result == 'success' }}
    permissions:
      contents: write
      pull-requests: write
    uses: ./.github/workflows/release-pr.yml
