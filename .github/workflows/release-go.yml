name: Release Go

on:
  push:
    branches: [main]
    paths:
      - 'packages/go/**'

permissions:
  contents: write
  pull-requests: write

jobs:
  release-go:
    name: Tag Go module
    runs-on: arc-runner-set
    if: "!startsWith(github.event.head_commit.message, 'chore(release):')"
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Determine version from Rust crate
        id: version
        run: |
          set -euo pipefail

          # Use the Rust crate version as the Go module version
          VERSION=$(sed -n 's/^version = "\(.*\)"/\1/p' crates/rara-style/Cargo.toml)
          TAG="packages/go/v${VERSION}"

          # Check if this tag already exists
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists, skipping"
            echo "skip=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "skip=false" >> $GITHUB_OUTPUT
          echo "Tagging Go module: $TAG"

      - name: Create and push tag
        if: steps.version.outputs.skip != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          TAG="${{ steps.version.outputs.tag }}"
          git tag -a "$TAG" -m "Release Go module $TAG"
          git push origin "$TAG"
